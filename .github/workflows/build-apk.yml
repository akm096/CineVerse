name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www/css www/js www/functions
          cp index.html www/
          cp player.html www/
          cp -r css/* www/css/
          cp -r js/* www/js/
          cp -r functions/* www/functions/
          cp gdrive-worker.js www/ 2>/dev/null || true

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CineVerse-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: CineVerse v1.0.${{ github.run_number }}
          body: |
            🎬 CineVerse Android APK
            
            Otomatik build - commit: ${{ github.sha }}
            
            **Kurulum:** APK dosyasını indirip Android telefonunuza yükleyin.
            Bilinmeyen kaynaklardan yüklemeye izin vermeniz gerekebilir.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
